services:
  - type: web
    name: lstm-next-word
    env: python
    region: oregon
    plan: starter          # free tier won't have enough RAM for TensorFlow
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
    # Uncomment the block below to add a persistent disk so your trained
    # model survives deploys (costs ~$0.25/GB/month on Render):
    # disk:
    #   name: model-storage
    #   mountPath: /opt/render/project/src
    #   sizeGB: 1
